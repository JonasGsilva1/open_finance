<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Criar Conta</title>

  <style>

    body {
      font-family: Arial;
      background: #4f46e5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 5px 20px rgba(0,0,0,.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #4f46e5;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #4338ca;
    }

    #resultado {
      margin-top: 15px;
    }

  </style>

</head>

<body>

<div class="box">

  <h1>➕ Criar Conta</h1>

  <input type="text" id="nome" placeholder="Nome" />

  <input type="text" id="cpf" placeholder="CPF" maxlength="11" />

  <input type="email" id="email" placeholder="Email" />

  <input type="text" id="telefone" placeholder="11999999999" maxlength="11" />

  <input type="password" id="senha" placeholder="Senha" />

  <input type="number" id="renda" placeholder="Renda mensal" />

  <input
  type="number"
  id="despesas"
  placeholder="Despesas mensais"/>

  <button onclick="criarConta()">
    Criar Conta
  </button>

  <div id="resultado"></div>

</div>

<script>

  async function criarConta() {

    const nome =
      document.getElementById('nome').value

    const cpf =
      document.getElementById('cpf').value

    const email =
      document.getElementById('email').value

    const telefone =
      document.getElementById('telefone').value

    const senha =
      document.getElementById('senha').value

    const renda_mensal =
      Number(document.getElementById('renda').value)

    const despesas_mensais =
        Number(document.getElementById('despesas').value)
      
    const resposta =
      await fetch(
        '/criar-conta',
        {
          method: 'POST',

          headers: {
            'Content-Type': 'application/json'
          },

          body: JSON.stringify({
            nome,
            cpf,
            email,
            telefone,
            senha,
            renda_mensal,
            despesas_mensais
          })
        }
      )

    const dados =
      await resposta.json()

    if (dados.erro) {

      document.getElementById('resultado')
        .innerHTML =
          `<p style="color:red;">
            ${dados.erro}
          </p>`

      return
    }

    // SALVA LOGIN
    localStorage.setItem(
      'usuario',
      JSON.stringify({
        id: dados.id,
        nome: dados.nome,
        email
      })
    )

    document.getElementById('resultado')
      .innerHTML = `

      <p style="color:green;">
        ✅ Conta criada com sucesso
      </p>

      <p>
        Score: ${dados.score}
      </p>

    `

    // REDIRECIONA
    setTimeout(() => {

      window.location.href =
        'dashboard.html'

    }, 1500)

  }

</script>

</body>
</html>
